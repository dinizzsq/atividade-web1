<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Perfil</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border: 1px solid #ddd;
        }
        h1 {
            color: #333;
        }
        p {
            color: #555;
        }
        .campo {
            margin-bottom: 15px;
        }
        .campo strong {
            color: #333;
        }
        a {
            color: #0066cc;
        }
        form {
            display: inline;
        }
        button {
            background: none;
            border: none;
            color: #cc0000;
            cursor: pointer;
            font-size: 14px;
            padding: 0;
            text-decoration: underline;
        }
        button:hover {
            color: #990000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Meu Perfil</h1>

        {% if user.is_authenticated %}
            <div class="campo">
                <strong>Usuário:</strong> {{ user.username }}
            </div>
            <div class="campo">
                <strong>E-mail:</strong>
                {% if user.email %}
                    {{ user.email }}
                {% else %}
                    (não informado)
                {% endif %}
            </div>
        {% endif %}

        <hr>

        <p>
            <a href="/painel/">Voltar ao Painel</a> |
            <form method="post" action="/logout/">
                {% csrf_token %}
                <button type="submit">Sair (Logout)</button>
            </form>
        </p>
    </div>
</body>
</html>
